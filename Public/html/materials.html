<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/materials.css"> <!-- Ensure the correct CSS file is linked -->
</head>
<body>
    <div id="header-placeholder"></div> <!-- for header-->
    
    <div id="content">
        <!-- Material Data Entry Table -->
        <table id="material-entry-table">
            <tr>
                <td>
                    <input list="material-list" id="material-name" placeholder="Enter material name">
                    <datalist id="material-list">
                        <!-- Options will be populated dynamically -->
                    </datalist>
                </td>
                <td>
                    <select id="unit" title="Unit">
                        <option value="m">Meter</option>
                        <option value="pcs">Pcs</option>
                    </select>
                </td>
                <td><input type="number" id="material-price" name="material-price" placeholder="Material Price  euro/unit"></td>
                <td><input type="number" id="labor-price" name="labor-price" placeholder="Labour Price euro/unit"></td>
            </tr>
        </table>
        
        <button type="button" id="submit-btn">Submit</button>

        <!-- Search Material Section -->
        <h3>Search Material:</h3>
        <input list="search-material-list" id="search-material-name" placeholder="Enter material name to search">
        <datalist id="search-material-list">
            <!-- Options will be populated dynamically -->
        </datalist>
        <div id="search-result"></div>

        <!-- Submitted Data Table -->
        <h3>Submitted Data:</h3>
        <table id="submitted-table" class="hidden">
            <thead>
                <tr>
                    <th>Material Name</th>
                    <th>Unit</th>
                    <th>Material Price</th>
                    <th>Labor Price</th>
                    <th>Action</th> <!-- Column for edit and delete buttons -->
                </tr>
            </thead>
            <tbody>
                <!-- Dynamically populated rows go here -->
            </tbody>
        </table>
    </div>

    <div id="footer-placeholder"></div> <!-- for footer-->
    <script src="/js/header.js"></script>
    <script src="/js/footer.js"></script>
    <script src="/js/material-submit.js"></script> <!-- Link to separate JS file -->
</body>
</html>
